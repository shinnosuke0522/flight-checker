extend type Query {
    ticket(id: ID @Pattern(regexp: "^[0-9ABCDEFGHJKMNPQRSTVWXYZ]{26}$")): Ticket
    tickets(filter: TicketFilter): [Ticket]!
}

input TicketFilter {
    ids: [ID!] @Size(max: 100)
    durationFrom: Date
    durationEnd: Date
}

type Ticket {
    id: ID!
    userId: UserId!
    flight: FlightInfo!
}
