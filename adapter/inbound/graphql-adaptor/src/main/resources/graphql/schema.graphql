# Directives for validation (graphql-java-extended-validation)
directive @Size(min : Int = 0, max : Int = 2147483647, message : String = "graphql.validation.Size.message") on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION
directive @Pattern(regexp : String! = ".*", flags : [PatternFlags]! = [], message : String = "graphql.validation.Pattern.message") on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION
directive @NotBlank(message : String = "graphql.validation.NotBlank.message") on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION

enum PatternFlags {
    UNIX_LINES,
    CASE_INSENSITIVE,
    COMMENTS,
    MULTILINE,
    DOTALL,
    UNICODE_CASE,
    CANON_EQ
}

scalar DateTime
scalar Date
scalar UserId

type Query {
    # FlightInfo
    flightInfo(identity: FlightIdentityInput!): FlightInfo!
    flightInfos(identities: [FlightIdentityInput!] @Size(max: 100)): [FlightInfo]!

    # Ticket
    ticket(id: ID @Pattern(regexp: "^[0-9ABCDEFGHJKMNPQRSTVWXYZ]{26}$")): Ticket
    tickets(filter: TicketFilter): [Ticket]!
}

# --- FlightInfo ---

interface FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
}

type ScheduledFlightInfo implements FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
}

type DelayedFlightInfo implements FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
    estimatedDepartureTime: DateTime
    estimatedArrivalTime: DateTime
}

type ArrivedFlightInfo implements FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
}

type CanceledFlightInfo implements FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
}

type UncertainFlightInfo implements FlightInfo {
    id: ID!
    identity: FlightIdentity!
    departurePoint: FlightPoint!
    arrivalPoint: FlightPoint!
    scheduledDepartureTime: DateTime!
    scheduledArrivalTime: DateTime!
    monitoringStatus: MonitoringStatus!
    reason: String!
}

input FlightIdentityInput {
    flightCode: String! @Pattern(regexp: "^([A-Z0-9]{2})(\\d{1,4}[A-Z]?)$")
    departureDate: Date!
}

type FlightIdentity {
    flightCode: String!
    departureDate: Date!
}

enum MonitoringStatus {
    IDLE
    ACTIVATED
    COMPLETED
    FAILED
}

type FlightPoint {
    countryCode: String!
    airportCode: String!
    zoneId: String!
}

# --- Ticket ---

input TicketFilter {
    ids: [ID!] @Size(max: 100)
    durationFrom: Date
    durationEnd: Date
}

type Ticket {
    id: ID!
    userId: UserId!
    flight: FlightInfo!
}
