extend type Query {
    travel(id: ID!): Travel
    travels(ids: [ID!]): [Travel!]!
}

type Travel {
    id: ID!
    name: String!
    schedule: Schedule!
    flights: Flights!
    status: TravelStatus!
}

interface Schedule {
    departureDate: Date!
}

type OneWayTripSchedule implements Schedule {
    departureDate: Date!
}

type RoundTripSchedule implements Schedule {
    departureDate: Date!
    returnDate: Date!
}

type Flights {
    flightSegments: [FlightSegment!]!
}

type FlightSegment {
    # FlightIdentity は flight-Info.graphql で定義されているものを参照します
    identity: FlightIdentity!
    status: FlightSegmentStatus!
}

enum FlightSegmentStatus {
    NORMAL
    DISRUPTED
    CHANGE_REQUIRED
}

enum TravelStatus {
    PLANNED
    STARTED
    COMPLETED
    CANCELED
}
